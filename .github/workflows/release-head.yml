name: Release Head

on:
  push:
    tags:
      - 'head/v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish @kraki/head
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/npm-artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Update npm CLI
        run: npm install --global npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm validate

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#head/v}"
          PKG_VERSION=$(node -p "require('./packages/head/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $PKG_VERSION ✅"

      - name: Build
        run: pnpm --filter @kraki/protocol build && pnpm --filter @kraki/head build

      - name: Pack and publish
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"

          specs=(
            "packages/protocol|@kraki/protocol"
            "packages/head|@kraki/head"
          )

          for spec in "${specs[@]}"; do
            dir="${spec%%|*}"
            pkg="${spec##*|}"
            version="$(node -p "require('./${dir}/package.json').version")"

            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${pkg}@${version}; already published."
              continue
            fi

            echo "::group::Publishing ${pkg}@${version}"
            pnpm --dir "$dir" pack --pack-destination "$ARTIFACT_DIR"
            tarball_name="$(node -p "const p = require('./${dir}/package.json'); p.name.replace(/^@/, '').replace('/', '-') + '-' + p.version + '.tgz'")"
            npm publish "$ARTIFACT_DIR/$tarball_name" --access public --provenance
            echo "::endgroup::"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
