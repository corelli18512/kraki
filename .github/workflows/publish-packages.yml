name: Publish Packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read
  checks: read
  id-token: write

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUBLISH_MODE: ${{ github.event_name == 'release' && 'publish' || github.event.inputs.mode || 'dry-run' }}
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts

    steps:
      - name: Check release scope
        id: scope
        env:
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          tag="${EVENT_RELEASE_TAG}"
          if [ "${GITHUB_EVENT_NAME}" = "release" ] && [ -n "$tag" ]; then
            case "$tag" in
              head-v*)
                echo "Tag '$tag' matches head scope ✅"
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Tag '$tag' is not a head release — skipping npm publish."
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            echo "Non-release trigger (workflow_dispatch) — proceeding with all packages."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure publish source is main
        if: steps.scope.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            git merge-base --is-ancestor "${GITHUB_SHA}" origin/main || {
              echo "Release tag must point to a commit on main."
              exit 1
            }
          else
            test "${GITHUB_REF_NAME}" = "main"
          fi

      - name: Ensure CI passed for this commit
        if: steps.scope.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Resolve tag to commit SHA (release events use the tag ref)
          sha=$(git rev-parse HEAD)
          echo "Checking CI status for ${sha}..."
          # Wait up to 5 minutes for CI to complete
          for i in $(seq 1 30); do
            status=$(gh api "repos/${{ github.repository }}/commits/${sha}/check-runs" \
              --jq '.check_runs[] | select(.name == "Validate") | .conclusion' | head -1)
            if [ "$status" = "success" ]; then
              echo "CI passed ✅"
              exit 0
            elif [ "$status" = "failure" ]; then
              echo "CI failed for ${sha}. Refusing to publish."
              exit 1
            fi
            echo "CI status: ${status:-pending}. Waiting 10s... (attempt $i/30)"
            sleep 10
          done
          echo "CI did not complete within 5 minutes. Refusing to publish."
          exit 1

      - name: Set up pnpm
        if: steps.scope.outputs.should_run == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Set up Node.js
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Update npm CLI
        if: steps.scope.outputs.should_run == 'true'
        run: npm install --global npm@latest

      - name: Install dependencies
        if: steps.scope.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate repository
        if: steps.scope.outputs.should_run == 'true'
        run: pnpm validate

      - name: Pack release tarballs
        if: steps.scope.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"

          specs=(
            "packages/protocol|@kraki/protocol"
            "packages/crypto|@kraki/crypto"
            "packages/head|@kraki/head"
          )

          for spec in "${specs[@]}"; do
            dir="${spec%%|*}"
            pkg="${spec##*|}"
            echo "::group::Packing $pkg"
            pnpm --dir "$dir" pack --pack-destination "$ARTIFACT_DIR"
            echo "::endgroup::"
          done

          ls -lh "$ARTIFACT_DIR"

      - name: Upload release tarballs
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages-${{ github.sha }}
          path: ${{ env.ARTIFACT_DIR }}

      - name: Publish packages
        if: steps.scope.outputs.should_run == 'true' && (github.event_name == 'release' || github.event.inputs.mode == 'publish')
        run: |
          set -euo pipefail

          specs=(
            "packages/protocol|@kraki/protocol"
            "packages/crypto|@kraki/crypto"
            "packages/head|@kraki/head"
          )

          for spec in "${specs[@]}"; do
            dir="${spec%%|*}"
            pkg="${spec##*|}"
            version="$(node -p "require('./${dir}/package.json').version")"
            tarball_name="$(node -p "const pkg = require('./${dir}/package.json'); pkg.name.replace(/^@/, '').replace('/', '-') + '-' + pkg.version + '.tgz'")"
            tarball_path="$ARTIFACT_DIR/$tarball_name"

            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${pkg}@${version}; it is already published."
              continue
            fi

            echo "::group::Publishing ${pkg}@${version}"
            test -f "$tarball_path"
            npm publish "$tarball_path" --access public --provenance
            echo "::endgroup::"
          done
