name: Release

on:
  push:
    tags:
      - 'tentacle/v*'
      - 'head/v*'
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish
      tag:
        description: Existing tag to build from (required for publish)
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  checks: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

# ─── Prepare ─────────────────────────────────────────────

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      publish_mode: ${{ steps.meta.outputs.publish_mode }}
      release_sha: ${{ steps.meta.outputs.release_sha }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target ref
        id: meta
        env:
          INPUT_MODE: ${{ github.event.inputs.mode || 'dry-run' }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          set -euo pipefail

          publish_mode="dry-run"
          checkout_ref="${GITHUB_SHA}"
          release_tag=""

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            publish_mode="publish"
            release_tag="${GITHUB_REF_NAME}"
            checkout_ref="${release_tag}"
          elif [ "${INPUT_MODE}" = "publish" ]; then
            publish_mode="publish"
            release_tag="${INPUT_TAG}"
            if [ -z "${release_tag}" ]; then
              echo "workflow_dispatch publish requires inputs.tag"
              exit 1
            fi
            checkout_ref="${release_tag}"
          else
            test "${GITHUB_REF_NAME}" = "main" || {
              echo "Dry-run builds must run from main."
              exit 1
            }
          fi

          git checkout --detach "${checkout_ref}"
          release_sha="$(git rev-parse HEAD)"

          {
            echo "checkout_ref=${checkout_ref}"
            echo "publish_mode=${publish_mode}"
            echo "release_sha=${release_sha}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure release source is main
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${{ steps.meta.outputs.release_sha }}" origin/main || {
            echo "Release target must point to a commit on main."
            exit 1
          }

      - name: Ensure CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.meta.outputs.release_sha }}
        run: |
          set -euo pipefail
          echo "Checking CI status for ${RELEASE_SHA}..."

          for i in $(seq 1 30); do
            status=$(gh api "repos/${{ github.repository }}/commits/${RELEASE_SHA}/check-runs" \
              --jq '.check_runs[] | select(.name == "Validate") | .conclusion' | head -1)

            if [ "${status}" = "success" ]; then
              echo "CI passed ✅"
              exit 0
            fi

            case "${status}" in
              failure|cancelled|timed_out|action_required)
                echo "CI status is ${status}. Refusing to release."
                exit 1
                ;;
            esac

            echo "CI status: ${status:-pending}. Waiting 10s... (attempt ${i}/30)"
            sleep 10
          done

          echo "CI did not complete within 5 minutes. Refusing to release."
          exit 1

      - name: Verify tag matches package version
        if: steps.meta.outputs.publish_mode == 'publish'
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.release_tag }}"

          if [[ "$TAG" == tentacle/v* ]]; then
            TAG_VERSION="${TAG#tentacle/v}"
            PKG_VERSION=$(node -p "require('./packages/tentacle/package.json').version")
          elif [[ "$TAG" == head/v* ]]; then
            TAG_VERSION="${TAG#head/v}"
            PKG_VERSION=$(node -p "require('./packages/head/package.json').version")
          else
            echo "Unknown tag prefix: $TAG"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $PKG_VERSION ✅"

  # ─── Build Tentacle Binary ───────────────────────────────

  build-binary:
    name: Build Binary (${{ matrix.label }})
    needs: prepare
    if: startsWith(github.ref_name, 'tentacle/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: Linux x64
            asset_name: kraki-cli-linux-x64
          - runner: macos-15-intel
            label: macOS x64
            asset_name: kraki-cli-macos-x64
          - runner: macos-14
            label: macOS arm64
            asset_name: kraki-cli-macos-arm64
          - runner: windows-2022
            label: Windows x64
            asset_name: kraki-cli-windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install tentacle build dependencies
        run: pnpm install --frozen-lockfile --filter @kraki/tentacle...

      - name: Run tentacle binary tests
        run: pnpm --filter @kraki/tentacle exec vitest run src/adapters/__tests__/copilot.test.ts src/__tests__/daemon.test.ts src/__tests__/cli.test.ts src/__tests__/logger.test.ts

      - name: Build tentacle binary
        run: pnpm --filter @kraki/tentacle run build:binary:local

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --options runtime \
            --entitlements packages/tentacle/entitlements.plist \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            packages/tentacle/dist/sea/${{ matrix.asset_name }}

      - name: Notarize binary (macOS)
        if: runner.os == 'macOS' && needs.prepare.outputs.publish_mode == 'publish'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip $RUNNER_TEMP/binary.zip packages/tentacle/dist/sea/${{ matrix.asset_name }}
          xcrun notarytool submit $RUNNER_TEMP/binary.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait

      - name: Smoke test tentacle binary
        run: node packages/tentacle/scripts/smoke-test-binary.mjs packages/tentacle/dist/sea/${{ matrix.asset_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.asset_name }}
          path: packages/tentacle/dist/sea/${{ matrix.asset_name }}
          if-no-files-found: error

  # ─── Build Toolbar ──────────────────────────────────────

  build-toolbar:
    name: Build Toolbar (${{ matrix.label }})
    if: false  # Toolbar build disabled — CLI-only releases for now
    needs:
      - prepare
      - build-binary
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            label: macOS
            tauri_args: --target universal-apple-darwin
          - runner: windows-latest
            label: Windows
            tauri_args: ''

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.runner == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/toolbar/src-tauri

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: build-kraki-*
          path: binary-staging
          merge-multiple: true

      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Stage sidecar binary
        shell: bash
        run: |
          mkdir -p packages/toolbar/src-tauri/sidecar
          ls -lh binary-staging/
          if [[ "${{ matrix.runner }}" == "macos-latest" ]]; then
            # Tauri universal build needs per-arch + universal sidecars
            cp binary-staging/kraki-cli-macos-arm64 packages/toolbar/src-tauri/sidecar/kraki-aarch64-apple-darwin
            cp binary-staging/kraki-cli-macos-x64   packages/toolbar/src-tauri/sidecar/kraki-x86_64-apple-darwin
            lipo -create \
              binary-staging/kraki-cli-macos-arm64 \
              binary-staging/kraki-cli-macos-x64 \
              -output packages/toolbar/src-tauri/sidecar/kraki-universal-apple-darwin
            chmod +x packages/toolbar/src-tauri/sidecar/kraki-*
            # Sign all sidecars with JIT entitlements
            for bin in packages/toolbar/src-tauri/sidecar/kraki-*; do
              codesign --force --options runtime \
                --entitlements packages/tentacle/entitlements.plist \
                --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" "$bin"
            done
          else
            cp binary-staging/kraki-cli-windows-x64.exe packages/toolbar/src-tauri/sidecar/kraki-x86_64-pc-windows-msvc.exe
          fi

      - name: Generate tray icons
        run: pnpm --filter @kraki/toolbar build:icons

      - name: Inject tentacle version into toolbar
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/tentacle/package.json').version")
          echo "Injecting version $VERSION into toolbar"
          sed -i.bak "s/^version = .*/version = \"$VERSION\"/" packages/toolbar/src-tauri/Cargo.toml
          rm -f packages/toolbar/src-tauri/Cargo.toml.bak
          node -e "
            const fs = require('fs');
            for (const f of ['packages/toolbar/src-tauri/tauri.conf.json', 'packages/toolbar/package.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/toolbar
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }}

      - name: Patch Info.plist (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          APP_PATH=$(find packages/toolbar/src-tauri/target -name 'Kraki.app' -type d | head -1)
          PLIST="$APP_PATH/Contents/Info.plist"
          echo "Patching $PLIST"
          # Remove LSRequiresCarbon — breaks macOS 26+ ("not supported on this Mac")
          plutil -remove LSRequiresCarbon "$PLIST" 2>/dev/null || true
          # Re-sign after plist modification
          codesign --force --deep --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            --options runtime --entitlements packages/toolbar/src-tauri/entitlements.plist \
            "$APP_PATH"
          echo "Patched and re-signed"

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          APP_PATH=$(find packages/toolbar/src-tauri/target -name 'Kraki.app' -type d | head -1)
          echo "Found app at: $APP_PATH"
          DMG_OUT="packages/toolbar/src-tauri/target/Kraki-macos.dmg"
          BG="packages/toolbar/src-tauri/dmg-background/background.png"

          # Remove Tauri's DMG — we'll make our own
          find packages/toolbar/src-tauri/target -name '*.dmg' -delete

          # Create read-write DMG
          APP_SIZE=$(du -sm "$APP_PATH" | awk '{print $1}')
          DMG_SIZE=$(( APP_SIZE + 20 ))m
          RW_DMG="/tmp/kraki-rw-$$.dmg"
          hdiutil create -size "$DMG_SIZE" -volname "Kraki" -fs HFS+ "$RW_DMG"

          # Mount
          MOUNT_OUT=$(hdiutil attach -readwrite -noverify -noautoopen "$RW_DMG")
          DEV=$(echo "$MOUNT_OUT" | head -1 | awk '{print $1}')
          MOUNT_DIR=$(echo "$MOUNT_OUT" | grep "/Volumes/" | sed 's/.*\/Volumes/\/Volumes/' | head -1 | xargs)
          echo "Mounted at: $MOUNT_DIR"

          # Copy app
          cp -R "$APP_PATH" "$MOUNT_DIR/Kraki.app"

          # Create Finder alias (not symlink) — carries the Applications folder icon
          osascript -e "tell application \"Finder\" to make new alias file at (POSIX file \"$MOUNT_DIR\" as alias) to (POSIX file \"/Applications\" as alias)"

          # Set custom icon on Applications alias
          APP_ICON_PNG="$MOUNT_DIR/Kraki.app/Contents/Resources/icon.icns"
          swift -e '
            import Cocoa
            let ws = NSWorkspace.shared
            let icon = ws.icon(forFile: "/Applications")
            let result = ws.setIcon(icon, forFile: CommandLine.arguments[1], options: [])
            print("Set Applications icon: \(result)")
          ' "$MOUNT_DIR/Applications"

          # Background
          if [ -f "$BG" ]; then
            mkdir -p "$MOUNT_DIR/.background"
            cp "$BG" "$MOUNT_DIR/.background/background.png"
          fi

          # Finder layout
          osascript <<APPLESCRIPT
          tell application "Finder"
            tell disk "Kraki"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {200, 120, 860, 520}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 128
              if exists file ".background:background.png" then
                set background picture of viewOptions to file ".background:background.png"
              end if
              set position of item "Kraki.app" of container window to {180, 170}
              set position of item "Applications" of container window to {480, 170}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          # Cleanup
          rm -rf "$MOUNT_DIR/.fseventsd" "$MOUNT_DIR/.Trashes"
          sync; sleep 1

          # Unmount and compress
          hdiutil detach "$DEV"
          hdiutil convert "$RW_DMG" -format UDZO -o "$DMG_OUT"
          rm -f "$RW_DMG"
          echo "DMG created: $(ls -lh "$DMG_OUT")"

      - name: Upload toolbar artifacts
        uses: actions/upload-artifact@v7
        with:
          name: toolbar-${{ matrix.label }}
          path: |
            packages/toolbar/src-tauri/target/Kraki-macos.dmg
            packages/toolbar/src-tauri/target/**/release/bundle/**/*.exe
            packages/toolbar/src-tauri/target/**/release/bundle/**/*.msi
            packages/toolbar/src-tauri/target/**/release/bundle/**/*.app.tar.gz
            packages/toolbar/src-tauri/target/**/release/bundle/**/*.app.tar.gz.sig
            packages/toolbar/src-tauri/target/**/release/bundle/**/*.exe.sig
            packages/toolbar/src-tauri/target/**/release/bundle/**/*.msi.sig
          if-no-files-found: warn

  # ─── Publish ────────────────────────────────────────────

  publish:
    name: Publish Release Assets
    needs:
      - prepare
      - build-binary
    if: startsWith(github.ref_name, 'tentacle/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: build-kraki-*
          path: release-assets
          merge-multiple: true

      - name: Download toolbar artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: toolbar-*
          path: toolbar-staging
          merge-multiple: true

      - name: Stage toolbar assets
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ ! -d toolbar-staging ] || [ -z "$(ls toolbar-staging 2>/dev/null)" ]; then
            echo "No toolbar artifacts — CLI-only release"
            exit 0
          fi
          # Rename Tauri outputs to clean names
          for f in $(find toolbar-staging -name '*.dmg'); do
            cp "$f" release-assets/Kraki-macos.dmg
          done
          for f in $(find toolbar-staging -name '*-setup.exe'); do
            cp "$f" release-assets/Kraki-windows-setup.exe
          done
          for f in $(find toolbar-staging -name '*.msi'); do
            cp "$f" release-assets/Kraki-windows.msi
          done
          ls -lh release-assets/

      - name: Generate latest.json for auto-updater
        continue-on-error: true
        if: hashFiles('toolbar-staging/**') != ''
        env:
          VERSION: ${{ needs.prepare.outputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VER="${VERSION#v}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          # Read signatures
          MACOS_SIG=$(find toolbar-staging -name '*.app.tar.gz.sig' | head -1 | xargs cat 2>/dev/null || echo "")
          WIN_SETUP_SIG=$(find toolbar-staging -name '*-setup.exe.sig' | head -1 | xargs cat 2>/dev/null || echo "")
          WIN_MSI_SIG=$(find toolbar-staging -name '*.msi.sig' | head -1 | xargs cat 2>/dev/null || echo "")

          # Stage updater bundles
          for f in $(find toolbar-staging -name '*.app.tar.gz'); do
            cp "$f" release-assets/Kraki-macos.app.tar.gz
          done
          for f in $(find toolbar-staging -name '*-setup.exe.sig'); do
            cp "$f" release-assets/Kraki-windows-setup.exe.sig
          done
          for f in $(find toolbar-staging -name '*.app.tar.gz.sig'); do
            cp "$f" release-assets/Kraki-macos.app.tar.gz.sig
          done

          # Use NSIS (setup.exe) as the Windows update target
          cat > release-assets/latest.json << ENDJSON
          {
            "version": "${VER}",
            "notes": "Update to v${VER}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE_URL}/Kraki-macos.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE_URL}/Kraki-macos.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WIN_SETUP_SIG}",
                "url": "${BASE_URL}/Kraki-windows-setup.exe"
              }
            }
          }
          ENDJSON
          echo "Generated latest.json:"
          cat release-assets/latest.json

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd release-assets
            sha256sum * > SHA256SUMS.txt
          )
          cat release-assets/SHA256SUMS.txt

      - name: Attest build provenance
        if: needs.prepare.outputs.publish_mode == 'publish'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'release-assets/*'

      - name: Upload release assets bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ needs.prepare.outputs.release_sha }}
          path: release-assets
          if-no-files-found: error

      - name: Create GitHub Release
        if: needs.prepare.outputs.publish_mode == 'publish'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.prepare.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ needs.prepare.outputs.release_tag }}" \
            --generate-notes \
            release-assets/*

  # ─── Publish npm packages ──────────────────────────────

  publish-npm:
    name: Publish npm Packages
    needs:
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.publish_mode == 'publish'
    permissions:
      contents: write
      id-token: write
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/npm-artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Update npm CLI
        run: npm install --global npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @kraki/protocol build && pnpm --filter @kraki/crypto build && pnpm --filter @kraki/tentacle build && pnpm --filter @kraki/head build

      - name: Pack and publish
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"

          specs=(
            "packages/protocol|@kraki/protocol"
            "packages/crypto|@kraki/crypto"
            "packages/tentacle|@kraki/tentacle"
            "packages/head|@kraki/head"
          )

          for spec in "${specs[@]}"; do
            dir="${spec%%|*}"
            pkg="${spec##*|}"
            version="$(node -p "require('./${dir}/package.json').version")"

            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${pkg}@${version}; already published."
              continue
            fi

            echo "::group::Publishing ${pkg}@${version}"
            pnpm --dir "$dir" pack --pack-destination "$ARTIFACT_DIR"
            tarball_name="$(node -p "const p = require('./${dir}/package.json'); p.name.replace(/^@/, '').replace('/', '-') + '-' + p.version + '.tgz'")"
            npm publish "$ARTIFACT_DIR/$tarball_name" --access public --provenance
            echo "::endgroup::"
          done

      - name: Create GitHub Release (head)
        if: startsWith(github.ref_name, 'head/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
