name: Release

on:
  push:
    tags:
      - 'v*'
      - 'head-v*'
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish
      tag:
        description: Existing tag to build from (required for publish)
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  checks: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

# ─── Prepare ─────────────────────────────────────────────

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      publish_mode: ${{ steps.meta.outputs.publish_mode }}
      release_sha: ${{ steps.meta.outputs.release_sha }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target ref
        id: meta
        env:
          INPUT_MODE: ${{ github.event.inputs.mode || 'dry-run' }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          set -euo pipefail

          publish_mode="dry-run"
          checkout_ref="${GITHUB_SHA}"
          release_tag=""

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            publish_mode="publish"
            release_tag="${GITHUB_REF_NAME}"
            checkout_ref="${release_tag}"
          elif [ "${INPUT_MODE}" = "publish" ]; then
            publish_mode="publish"
            release_tag="${INPUT_TAG}"
            if [ -z "${release_tag}" ]; then
              echo "workflow_dispatch publish requires inputs.tag"
              exit 1
            fi
            checkout_ref="${release_tag}"
          else
            test "${GITHUB_REF_NAME}" = "main" || {
              echo "Dry-run builds must run from main."
              exit 1
            }
          fi

          git checkout --detach "${checkout_ref}"
          release_sha="$(git rev-parse HEAD)"

          {
            echo "checkout_ref=${checkout_ref}"
            echo "publish_mode=${publish_mode}"
            echo "release_sha=${release_sha}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure release source is main
        run: |
          set -euo pipefail
          git fetch origin main
          git merge-base --is-ancestor "${{ steps.meta.outputs.release_sha }}" origin/main || {
            echo "Release target must point to a commit on main."
            exit 1
          }

      - name: Ensure CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.meta.outputs.release_sha }}
        run: |
          set -euo pipefail
          echo "Checking CI status for ${RELEASE_SHA}..."

          for i in $(seq 1 30); do
            status=$(gh api "repos/${{ github.repository }}/commits/${RELEASE_SHA}/check-runs" \
              --jq '.check_runs[] | select(.name == "Validate") | .conclusion' 2>/dev/null | head -1 || true)

            if [ "${status}" = "success" ]; then
              echo "CI passed ✅"
              exit 0
            fi

            case "${status}" in
              failure|cancelled|timed_out|action_required)
                echo "CI status is ${status}. Refusing to release."
                exit 1
                ;;
            esac

            echo "CI status: ${status:-pending}. Waiting 10s... (attempt ${i}/30)"
            sleep 10
          done

          echo "CI did not complete within 5 minutes. Refusing to release."
          exit 1

      - name: Verify tag matches package version
        if: steps.meta.outputs.publish_mode == 'publish'
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.release_tag }}"

          if [[ "$TAG" == head-v* ]]; then
            TAG_VERSION="${TAG#head-v}"
            PKG_VERSION=$(node -p "require('./packages/head/package.json').version")
            PKG_NAME="@kraki/head"
          elif [[ "$TAG" == v* ]]; then
            TAG_VERSION="${TAG#v}"
            PKG_VERSION=$(node -p "require('./packages/tentacle/package.json').version")
            PKG_NAME="@kraki/tentacle"
          else
            echo "Unknown tag prefix: $TAG (expected v* or head-v*)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match $PKG_NAME version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $PKG_NAME@$PKG_VERSION ✅"

  # ─── Build Tentacle Binary ───────────────────────────────

  build-binary:
    name: Build Binary (${{ matrix.label }})
    needs: prepare
    # Skip for head-only releases — the binary build is tentacle-specific.
    if: |
      (startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'head-v'))
      || (github.event_name == 'workflow_dispatch' && !startsWith(github.event.inputs.tag, 'head-v'))
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: Linux x64
            asset_name: kraki-cli-linux-x64
          - runner: macos-15-intel
            label: macOS x64
            asset_name: kraki-cli-macos-x64
          - runner: macos-14
            label: macOS arm64
            asset_name: kraki-cli-macos-arm64
          - runner: windows-2022
            label: Windows x64
            asset_name: kraki-cli-windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install tentacle build dependencies
        run: pnpm install --frozen-lockfile --filter @kraki/tentacle...

      - name: Run tentacle binary tests
        run: pnpm --filter @kraki/tentacle exec vitest run src/adapters/__tests__/copilot.test.ts src/__tests__/daemon.test.ts src/__tests__/cli.test.ts src/__tests__/logger.test.ts

      - name: Build tentacle binary
        run: pnpm --filter @kraki/tentacle run build:binary:local

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --options runtime \
            --entitlements packages/tentacle/entitlements.plist \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            packages/tentacle/dist/sea/${{ matrix.asset_name }}

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          BINARY="packages/tentacle/dist/sea/${{ matrix.asset_name }}"
          VERSION=$(node -p "require('./packages/tentacle/package.json').version")
          APP_DIR="packages/tentacle/dist/sea/Kraki.app"

          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp "$BINARY" "$APP_DIR/Contents/MacOS/kraki"

          # Ship a real icon so the CLI's Kraki.app is visually distinct from
          # a generic binary in System Settings / Finder / Dock. Generated
          # from the repo's brand logo.png (the canonical kraki identity) so
          # the CLI carries the right icon regardless of any other package.
          # sips + iconutil ship with macOS and are present on GitHub macos runners.
          ICONSET="$APP_DIR/Contents/Resources/app.iconset"
          mkdir -p "$ICONSET"
          for spec in "16 16" "32 16@2x" "32 32" "64 32@2x" "128 128" "256 128@2x" \
                      "256 256" "512 256@2x" "512 512" "1024 512@2x"; do
            set -- $spec; sz=$1; nm=$2
            sips -z "$sz" "$sz" logo.png --out "$ICONSET/icon_${nm}.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$APP_DIR/Contents/Resources/app.icns"
          rm -rf "$ICONSET"

          cat > "$APP_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>chat.kraki.cli</string>
              <key>CFBundleName</key>
              <string>Kraki</string>
              <key>CFBundleExecutable</key>
              <string>kraki</string>
              <key>CFBundleIconFile</key>
              <string>app</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSUIElement</key>
              <true/>
              <key>LSBackgroundOnly</key>
              <true/>
          </dict>
          </plist>
          PLIST

          # Sign the bundle — this re-signs the executable inside too
          codesign --force --deep --options runtime \
            --entitlements packages/tentacle/entitlements.plist \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            "$APP_DIR"

          # Create tar.gz for distribution
          ARCH="${{ matrix.asset_name }}"
          ARCH="${ARCH#kraki-cli-macos-}"
          tar -czf "packages/tentacle/dist/sea/kraki-macos-${ARCH}.app.tar.gz" \
            -C packages/tentacle/dist/sea Kraki.app

          echo "Created kraki-macos-${ARCH}.app.tar.gz"
          ls -lh "packages/tentacle/dist/sea/kraki-macos-${ARCH}.app.tar.gz"

      - name: Notarize binary (macOS)
        if: runner.os == 'macOS' && needs.prepare.outputs.publish_mode == 'publish'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Notarize the standalone binary
          zip $RUNNER_TEMP/binary.zip packages/tentacle/dist/sea/${{ matrix.asset_name }}
          xcrun notarytool submit $RUNNER_TEMP/binary.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          # Mach-O binaries cannot be stapled (error 73); macOS verifies
          # the notarization ticket online at first launch instead.

          # Notarize the .app bundle
          zip -r $RUNNER_TEMP/app-bundle.zip packages/tentacle/dist/sea/Kraki.app
          xcrun notarytool submit $RUNNER_TEMP/app-bundle.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait

      - name: Smoke test tentacle binary
        run: node packages/tentacle/scripts/smoke-test-binary.mjs packages/tentacle/dist/sea/${{ matrix.asset_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.asset_name }}
          path: packages/tentacle/dist/sea/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload .app bundle artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.asset_name }}-app
          path: packages/tentacle/dist/sea/kraki-macos-*.app.tar.gz
          if-no-files-found: error

  # ─── Publish ────────────────────────────────────────────

  publish:
    name: Publish Release Assets
    needs:
      - prepare
      - build-binary
    # Skip for head-only releases — there are no tentacle binaries to publish.
    if: |
      (startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'head-v'))
      || (github.event_name == 'workflow_dispatch' && !startsWith(github.event.inputs.tag, 'head-v'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: build-kraki-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd release-assets
            sha256sum * > SHA256SUMS.txt
          )
          cat release-assets/SHA256SUMS.txt

      - name: Attest build provenance
        if: needs.prepare.outputs.publish_mode == 'publish'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'release-assets/*'

      - name: Upload release assets bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ needs.prepare.outputs.release_sha }}
          path: release-assets
          if-no-files-found: error

      - name: Create GitHub Release
        if: needs.prepare.outputs.publish_mode == 'publish'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.prepare.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ needs.prepare.outputs.release_tag }}" \
            --generate-notes \
            release-assets/*

  # ─── Publish npm packages ──────────────────────────────

  publish-npm:
    name: Publish npm Packages
    needs:
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.publish_mode == 'publish'
    permissions:
      contents: write
      id-token: write
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/npm-artifacts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Show npm version
        # Node 24 bundles a complete npm (with the `sigstore` dep) that supports
        # `npm publish --provenance`. We deliberately do NOT `npm i -g npm@latest`
        # here: npm's global self-upgrade has shipped broken trees missing its own
        # `sigstore`/`tuf-js` deps, which made `--provenance` crash with
        # "Cannot find module 'sigstore'". Use the bundled npm as-is.
        run: npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @kraki/protocol build && pnpm --filter @kraki/crypto build && pnpm --filter @kraki/tentacle build && pnpm --filter @kraki/head build

      - name: Pack and publish
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"

          specs=(
            "packages/protocol|@kraki/protocol"
            "packages/crypto|@kraki/crypto"
            "packages/tentacle|@kraki/tentacle"
            "packages/head|@kraki/head"
          )

          for spec in "${specs[@]}"; do
            dir="${spec%%|*}"
            pkg="${spec##*|}"
            version="$(node -p "require('./${dir}/package.json').version")"

            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${pkg}@${version}; already published."
              continue
            fi

            echo "::group::Publishing ${pkg}@${version}"
            pnpm --dir "$dir" pack --pack-destination "$ARTIFACT_DIR"
            tarball_name="$(node -p "const p = require('./${dir}/package.json'); p.name.replace(/^@/, '').replace('/', '-') + '-' + p.version + '.tgz'")"
            npm publish "$ARTIFACT_DIR/$tarball_name" --access public --provenance
            echo "::endgroup::"
          done
