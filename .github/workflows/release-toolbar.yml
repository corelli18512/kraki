name: Release Toolbar

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-toolbar-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Toolbar (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            target: universal-apple-darwin
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/toolbar/src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tentacle binary (sidecar)
        run: pnpm build:tentacle:binary

      - name: Stage sidecar binary
        shell: bash
        run: |
          mkdir -p packages/toolbar/src-tauri/sidecar
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            cp packages/tentacle/dist/kraki-macos-arm64 packages/toolbar/src-tauri/sidecar/kraki-aarch64-apple-darwin
            cp packages/tentacle/dist/kraki-macos-x64  packages/toolbar/src-tauri/sidecar/kraki-x86_64-apple-darwin
          else
            cp packages/tentacle/dist/kraki-win-x64.exe packages/toolbar/src-tauri/sidecar/kraki-x86_64-pc-windows-msvc.exe
          fi

      - name: Generate tray icons
        run: pnpm --filter @kraki/toolbar build:icons

      - name: Inject tentacle version into toolbar
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/tentacle/package.json').version")
          echo "Injecting version $VERSION into toolbar"
          sed -i.bak "s/^version = .*/version = \"$VERSION\"/" packages/toolbar/src-tauri/Cargo.toml
          rm -f packages/toolbar/src-tauri/Cargo.toml.bak
          node -e "
            const fs = require('fs');
            for (const f of ['packages/toolbar/src-tauri/tauri.conf.json', 'packages/toolbar/package.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/toolbar
          tagName: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          releaseName: Kraki ${{ github.event.release.tag_name || github.event.inputs.tag }}
          releaseBody: Desktop toolbar for Kraki — macOS menu bar & Windows system tray.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
