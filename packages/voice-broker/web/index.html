<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Kraki voice broker — mic test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      }
      body {
        max-width: 720px;
        margin: 0 auto;
        padding: 1.5rem;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.25rem;
      }
      .subtitle {
        opacity: 0.6;
        font-size: 0.85rem;
        margin: 0 0 1.5rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        opacity: 0.8;
        margin: 0.75rem 0 0.25rem;
      }
      input[type="text"] {
        width: 100%;
        padding: 0.5rem;
        font: inherit;
        font-size: 0.9rem;
        border-radius: 6px;
        border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
        background: transparent;
        color: inherit;
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin: 1.25rem 0;
      }
      button {
        font: inherit;
        padding: 0.6rem 1rem;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
        background: transparent;
        color: inherit;
        cursor: pointer;
        touch-action: manipulation;
      }
      button.primary {
        background: #d33;
        color: white;
        border-color: #d33;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #status {
        font-size: 0.85rem;
        opacity: 0.8;
      }
      .meter {
        height: 6px;
        background: color-mix(in srgb, currentColor 10%, transparent);
        border-radius: 3px;
        overflow: hidden;
        margin: 0.5rem 0;
      }
      .meter > div {
        height: 100%;
        width: 0%;
        background: #d33;
        transition: width 60ms linear;
      }
      .transcript {
        margin-top: 1.5rem;
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid color-mix(in srgb, currentColor 15%, transparent);
        background: color-mix(in srgb, currentColor 4%, transparent);
        min-height: 4rem;
        font-size: 1.05rem;
        white-space: pre-wrap;
      }
      .transcript .partial {
        opacity: 0.55;
      }
      .log {
        margin-top: 1.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.75rem;
        opacity: 0.6;
        max-height: 12rem;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>🦑 Kraki voice broker — mic test</h1>
    <p class="subtitle">
      Captures mic → downsamples to 16 kHz mono PCM → streams to the broker → renders transcripts.
      Use this to validate the full local stack before wiring into <code>arm</code>.
    </p>

    <label for="brokerUrl">Broker WSS URL</label>
    <input id="brokerUrl" type="text" />

    <div class="controls">
      <button id="recordBtn" class="primary">🎙 Hold to speak</button>
      <button id="testBtn">Send 1s silence</button>
      <span id="status">idle</span>
    </div>
    <div class="meter"><div id="meter"></div></div>

    <div id="transcript" class="transcript"><span class="partial">(transcripts appear here)</span></div>

    <details>
      <summary style="cursor: pointer; opacity: 0.7; font-size: 0.85rem; margin-top: 1rem">log</summary>
      <div id="log" class="log"></div>
    </details>

    <script type="module" src="./mic.js"></script>
  </body>
</html>
